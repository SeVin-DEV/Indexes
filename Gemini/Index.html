<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeVin-DEV Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'JetBrains Mono', monospace; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .desktop-bg { background: radial-gradient(circle, #1a1a2e 0%, #16213e 50%, #0f3460 100%); }
        .icon-hover:hover { background: rgba(255, 255, 255, 0.15); transform: scale(1.05); }
        #lock-screen { display: none; }
        .blur-bg { filter: blur(20px); pointer-events: none; }
        @keyframes pulse-7 { 0% { opacity: 0.3; } 50% { opacity: 0.8; } 100% { opacity: 0.3; } }
        .svn-logo { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 15rem; color: rgba(255,255,255,0.03); font-weight: bold; pointer-events: none; }
    </style>
</head>
<body class="desktop-bg h-screen w-screen text-white select-none">

    <div id="main-ui" class="h-full w-full relative">
        <div class="svn-logo">777</div>

        <div class="p-8 grid grid-cols-1 w-32 gap-8">
            <div onclick="openAuth('svnai')" class="flex flex-col items-center cursor-pointer icon-hover p-4 rounded-xl transition-all">
                <div class="w-16 h-16 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl mb-2 flex items-center justify-center shadow-lg border border-white/20">
                    <span class="text-2xl">🧠</span>
                </div>
                <span class="text-sm font-bold shadow-sm text-center">svnai</span>
            </div>

            <div onclick="openOverlay('settings')" class="flex flex-col items-center cursor-pointer icon-hover p-4 rounded-xl transition-all">
                <div class="w-16 h-16 bg-gray-700/50 rounded-2xl mb-2 flex items-center justify-center shadow-lg border border-white/10">
                    <span class="text-2xl">⚙️</span>
                </div>
                <span class="text-sm font-bold shadow-sm">Settings</span>
            </div>
        </div>

        <div class="absolute bottom-0 w-full flex justify-center pb-4 group">
            <div class="glass px-6 py-2 rounded-full flex items-center gap-8 translate-y-12 group-hover:translate-y-0 transition-transform duration-500">
                <div onclick="openLock()" class="hover:text-red-400 cursor-pointer flex flex-col items-center">
                    <span class="text-xl">⏻</span>
                    <span class="text-[10px]">LOG OFF</span>
                </div>
                <div class="h-8 w-[1px] bg-white/20"></div>
                <div id="clock" class="text-sm font-bold">00:00:00</div>
            </div>
        </div>
    </div>

    <div id="auth-modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">
        <div class="glass p-8 rounded-3xl w-96 shadow-2xl">
            <h2 id="app-name" class="text-xl font-bold mb-6 text-center uppercase tracking-widest">Access Request</h2>
            <div class="flex flex-col gap-3">
                <button onclick="showPass('admin')" class="bg-indigo-600 hover:bg-indigo-500 py-3 rounded-lg font-bold">ADMIN</button>
                <button onclick="showPass('user')" class="bg-blue-600 hover:bg-blue-500 py-3 rounded-lg font-bold">USER</button>
                <button onclick="guestLogin()" class="bg-emerald-600 hover:bg-emerald-500 py-3 rounded-lg font-bold">GUEST</button>
            </div>
        </div>
    </div>

    <div id="pass-modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">
        <div class="glass p-8 rounded-3xl w-96 shadow-2xl border-t-4 border-indigo-500">
            <h2 class="text-lg font-bold mb-4">Enter Password</h2>
            <input type="password" id="pass-input" class="w-full bg-black/20 border border-white/20 p-3 rounded mb-4 focus:outline-none focus:border-indigo-400">
            <div class="flex justify-between">
                <button onclick="closeModals()" class="text-sm text-gray-400">Cancel</button>
                <button onclick="verifyPass()" class="bg-white text-black px-6 py-2 rounded font-bold">GRANT ACCESS</button>
            </div>
        </div>
    </div>

    <div id="lock-screen" class="fixed inset-0 bg-black/60 flex items-center justify-center z-[100] backdrop-blur-xl">
        <div class="bg-white/10 p-10 rounded-2xl border border-white/10 w-[400px] shadow-2xl">
            <h1 class="text-2xl font-bold mb-8 text-center text-indigo-300">SeVin-DEV SYSTEM LOCK</h1>
            <select id="lock-role" onchange="toggleLockPass()" class="w-full bg-black/40 border border-white/10 p-3 rounded mb-4 outline-none">
                <option value="admin">Administrator</option>
                <option value="user">Standard User</option>
                <option value="guest">Guest Access</option>
            </select>
            <input type="password" id="lock-pass" placeholder="Password" class="w-full bg-black/40 border border-white/10 p-3 rounded mb-6 outline-none">
            
            <div class="flex items-center justify-between">
                <button onclick="location.reload()" class="bg-red-500/20 hover:bg-red-500/40 text-red-300 px-4 py-2 rounded text-xs uppercase tracking-tighter">Power Off</button>
                <button onclick="unlock()" class="bg-indigo-600 px-8 py-2 rounded font-bold hover:bg-indigo-500">LOGIN</button>
            </div>
        </div>
    </div>

    <script>
        // Clock Function
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);

        function openAuth(name) {
            document.getElementById('app-name').innerText = `Authorize ${name}`;
            document.getElementById('auth-modal').classList.remove('hidden');
        }

        function showPass(role) {
            document.getElementById('auth-modal').classList.add('hidden');
            document.getElementById('pass-modal').classList.remove('hidden');
        }

        function guestLogin() {
            alert('Welcome, Guest.');
            closeModals();
        }

        function verifyPass() {
            alert('Access Granted.');
            closeModals();
        }

        function closeModals() {
            document.getElementById('auth-modal').classList.add('hidden');
            document.getElementById('pass-modal').classList.add('hidden');
        }

        function openLock() {
            document.getElementById('main-ui').classList.add('blur-bg');
            document.getElementById('lock-screen').style.display = 'flex';
            if(document.exitFullscreen) document.exitFullscreen();
        }

        function toggleLockPass() {
            const role = document.getElementById('lock-role').value;
            document.getElementById('lock-pass').style.display = (role === 'guest') ? 'none' : 'block';
        }

        function unlock() {
            document.getElementById('main-ui').classList.remove('blur-bg');
            document.getElementById('lock-screen').style.display = 'none';
        }
    </script>
</body>
</html>
